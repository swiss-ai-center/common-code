# Documentation: https://docs.github.com/en/actions/creating-actions/creating-a-composite-action
name: test_python_app
description: Test a Python app

inputs:
  python-app-path:
    description: Python app path
    required: true
    default: .
  token:
    description: GitHub token
    required: true
    default: ""

runs:
  using: composite
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        # Enable caching to speed up future workflow runs
        enable-cache: true

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install app dependencies
      shell: bash
      working-directory: ${{ inputs.python-app-path }}
      # Use uv to install dependencies into the system Python environment
      run: uv sync

    - name: Run Python tests
      shell: bash
      working-directory: ${{ inputs.python-app-path }}
      run: uv run pytest

    - name: Coverage report
      uses: orgoro/coverage@v3.1
      if: github.event_name == 'pull_request'
      with:
        coverageFile: ${{ inputs.python-app-path }}/coverage.xml
        token: ${{ inputs.token }}