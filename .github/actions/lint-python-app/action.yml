# Documentation: https://docs.github.com/en/actions/creating-actions/creating-a-composite-action
name: lint_python_app
description: Lint a Python app

inputs:
  python-app-path:
    description: Python app path
    required: true
    default: .

runs:
  using: composite
  steps:
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install uv
      shell: bash
      # Install uv using the existing pip
      run: pip install uv

    - name: Install app dependencies
      shell: bash
      working-directory: ${{ inputs.python-app-path }}
      # Get flake8 version from requirements.txt and install using uv
      # The --system flag is required because uv avoids modifying system Python by default
      run: uv sync

    - name: Lint Python code
      shell: bash
      working-directory: ${{ inputs.python-app-path }}
      run: uv run flake8 .